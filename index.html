<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Logo Wall — dataruleseverythingaroundme/logos</title>
<style>
  :root{
    --bg:#f6f7fb; --card:#fff; --ink:#14121f; --muted:#6b6880;
    --line:#e7e6ef; --accent:#6b4bff; --accent-ink:#fff; --chip:#efeefc;
    --shadow:0 1px 3px rgba(20,18,31,.06),0 6px 20px rgba(20,18,31,.05);
  }
  @media (prefers-color-scheme:dark){
    :root{--bg:#0f0e17;--card:#1a1826;--ink:#f3f2fa;--muted:#a5a2b8;
      --line:#2a2838;--chip:#231f3a;--shadow:0 1px 3px rgba(0,0,0,.4);}
  }
  *{box-sizing:border-box}
  body{margin:0;font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);color:var(--ink)}
  header{position:sticky;top:0;z-index:5;background:var(--bg);
    border-bottom:1px solid var(--line);padding:18px 20px 14px}
  h1{margin:0 0 2px;font-size:20px;display:flex;align-items:center;gap:9px}
  h1 .dot{width:14px;height:14px;border-radius:4px;background:var(--accent)}
  .sub{color:var(--muted);font-size:13px;margin-bottom:12px}
  .controls{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  #q{flex:1;min-width:220px;padding:11px 14px;border:1px solid var(--line);
    border-radius:11px;background:var(--card);color:var(--ink);font-size:15px;box-shadow:var(--shadow)}
  #q:focus{outline:2px solid var(--accent);outline-offset:1px}
  .chips{display:flex;gap:6px;flex-wrap:wrap}
  .chip{padding:8px 13px;border:1px solid var(--line);border-radius:999px;
    background:var(--card);color:var(--muted);cursor:pointer;font-size:13px;user-select:none}
  .chip[aria-pressed=true]{background:var(--accent);color:var(--accent-ink);border-color:var(--accent)}
  .count{color:var(--muted);font-size:13px;padding:10px 20px 0}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
    gap:12px;padding:14px 20px 60px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:13px;
    padding:14px 10px 10px;text-align:center;cursor:pointer;box-shadow:var(--shadow);
    transition:transform .08s ease,border-color .08s ease;position:relative}
  .card:hover{transform:translateY(-2px);border-color:var(--accent)}
  .thumb{height:56px;display:flex;align-items:center;justify-content:center;margin-bottom:9px}
  .thumb img{max-height:56px;max-width:100%;object-fit:contain}
  .card.broken .thumb::after{content:"no preview";color:var(--muted);font-size:11px}
  .card.broken .thumb img{display:none}
  .name{font-size:12px;word-break:break-word;line-height:1.35}
  .badge{position:absolute;top:8px;right:8px;font-size:9px;letter-spacing:.03em;
    text-transform:uppercase;padding:2px 6px;border-radius:6px;background:var(--chip);color:var(--muted)}
  .badge.curated{background:var(--accent);color:var(--accent-ink)}
  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);
    background:var(--ink);color:var(--bg);padding:11px 18px;border-radius:11px;font-size:14px;
    opacity:0;pointer-events:none;transition:.18s;box-shadow:var(--shadow);max-width:86vw;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .more{grid-column:1/-1;text-align:center;padding:18px}
  .more button{padding:11px 20px;border:1px solid var(--line);border-radius:11px;
    background:var(--card);color:var(--ink);cursor:pointer;font-size:14px}
  .empty{grid-column:1/-1;text-align:center;color:var(--muted);padding:50px 0}
</style>
</head>
<body>
<header>
  <h1><span class="dot"></span>Logo Wall</h1>
  <div class="sub" id="sub">Loading logos…</div>
  <div class="controls">
    <input id="q" type="search" placeholder="Search a brand… (e.g. slack, databricks, bayer)" autocomplete="off">
    <div class="chips" id="chips">
      <span class="chip" data-src="all" aria-pressed="true">All</span>
      <span class="chip" data-src="curated" aria-pressed="false">Curated</span>
      <span class="chip" data-src="thesvg" aria-pressed="false">theSVG</span>
      <span class="chip" data-src="gilbarbara" aria-pressed="false">gilbarbara</span>
    </div>
  </div>
</header>
<div class="count" id="count"></div>
<div class="grid" id="grid"></div>
<div class="toast" id="toast"></div>

<script>
const REPO = "https://cdn.jsdelivr.net/gh/dataruleseverythingaroundme/logos@main";
const PKG  = "https://data.jsdelivr.com/v1/packages/gh/dataruleseverythingaroundme/logos@main";
const MIRROR = REPO + "/mirror.manifest.json";
const IMG = /\.(svg|png|gif|jpe?g|webp)$/i;
const SKIP = new Set(["mirror.manifest.json","logos.manifest.json"]);
const PAGE = 300;

let all = [], filtered = [], shown = 0, source = "all", term = "";
const grid = document.getElementById("grid");
const countEl = document.getElementById("count");
const toast = document.getElementById("toast");

async function load(){
  const [pkg, mirror] = await Promise.all([
    fetch(PKG).then(r=>r.json()).catch(()=>({files:[]})),
    fetch(MIRROR).then(r=>r.json()).catch(()=>({mirror:[]}))
  ]);
  // curated = real image files committed in the repo
  const curated = (pkg.files||[])
    .filter(f=>f.type==="file" && IMG.test(f.name) && !SKIP.has(f.name))
    .map(f=>({name:f.name.replace(IMG,""), source:"curated", url:REPO+"/"+f.name, variants:null}));
  const curatedNames = new Set(curated.map(c=>c.name.toLowerCase()));
  // mirror = reference-only, drop any that duplicate a curated brand slug
  const mir = (mirror.mirror||[])
    .filter(e=>!curatedNames.has(e.name.toLowerCase()))
    .map(e=>({name:e.name, source:e.source, url:e.url, variants:e.variants||null}));
  all = curated.concat(mir);
  document.getElementById("sub").textContent =
    all.length.toLocaleString()+" logos · "+curated.length+" curated · "+mir.length.toLocaleString()+" mirrored (theSVG + gilbarbara). Click any logo to copy its link.";
  apply();
}

function apply(){
  const t = term.trim().toLowerCase();
  filtered = all.filter(e=>{
    if(source!=="all" && e.source!==source) return false;
    if(t && !e.name.toLowerCase().includes(t)) return false;
    return true;
  });
  shown = 0; grid.innerHTML = "";
  if(!filtered.length){ grid.innerHTML='<div class="empty">No logos match. Try a shorter word.</div>'; countEl.textContent=""; return; }
  render();
}

function render(){
  const slice = filtered.slice(shown, shown+PAGE);
  const frag = document.createDocumentFragment();
  for(const e of slice){
    const card = document.createElement("div");
    card.className = "card";
    const badge = e.source==="curated" ? "curated" : (e.source==="thesvg"?"theSVG":"gilbarbara");
    card.innerHTML =
      '<span class="badge '+(e.source==="curated"?"curated":"")+'">'+badge+'</span>'+
      '<div class="thumb"><img loading="lazy" alt="" src="'+e.url+'"></div>'+
      '<div class="name">'+e.name+'</div>';
    card.querySelector("img").onerror = ()=>card.classList.add("broken");
    card.onclick = ()=>copy(e);
    frag.appendChild(card);
  }
  grid.appendChild(frag);
  shown += slice.length;
  const old = grid.querySelector(".more"); if(old) old.remove();
  if(shown < filtered.length){
    const more = document.createElement("div");
    more.className = "more";
    more.innerHTML = '<button>Show more ('+(filtered.length-shown).toLocaleString()+' left)</button>';
    more.querySelector("button").onclick = render;
    grid.appendChild(more);
  }
  countEl.textContent = "Showing "+shown.toLocaleString()+" of "+filtered.length.toLocaleString();
}

function copy(e){
  navigator.clipboard.writeText(e.url).then(()=>{
    let msg = "Copied: "+e.url;
    if(e.variants && e.variants.length>1) msg += "  (variants: "+e.variants.join(", ")+")";
    toast.textContent = msg; toast.classList.add("show");
    clearTimeout(copy._t); copy._t = setTimeout(()=>toast.classList.remove("show"), 2600);
  });
}

let deb;
document.getElementById("q").addEventListener("input", ev=>{
  clearTimeout(deb); deb = setTimeout(()=>{ term = ev.target.value; apply(); }, 140);
});
document.getElementById("chips").addEventListener("click", ev=>{
  const c = ev.target.closest(".chip"); if(!c) return;
  source = c.dataset.src;
  [...document.querySelectorAll(".chip")].forEach(x=>x.setAttribute("aria-pressed", x===c));
  apply();
});
load();
</script>
</body>
</html>
